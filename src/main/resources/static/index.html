<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线中国象棋 - 登录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1>♔ 在线中国象棋</h1>
            <p>双人实时对弈平台</p>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn active" onclick="switchTab('login')">登 录</button>
            <button class="tab-btn" onclick="switchTab('register')">注 册</button>
        </div>

        <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" required placeholder="请输入用户名" autocomplete="username">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" required placeholder="请输入密码" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">登 录</button>
            <div id="loginError" class="error-msg"></div>
        </form>

        <form id="registerForm" class="auth-form hidden" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUsername" required placeholder="请输入用户名" autocomplete="username">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPassword" required placeholder="请输入密码" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="regNickname" placeholder="请输入昵称（选填）">
            </div>
            <button type="submit" class="btn btn-primary btn-block">注 册</button>
            <div id="registerError" class="error-msg"></div>
        </form>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');

            if (tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginForm').classList.remove('hidden');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('registerForm').classList.remove('hidden');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            errorEl.textContent = '';

            try {
                const res = await fetch('/api/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.code === 200) {
                    localStorage.setItem('userInfo', JSON.stringify(data.data));
                    window.location.href = '/lobby.html';
                } else {
                    errorEl.textContent = data.message;
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请重试';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const nickname = document.getElementById('regNickname').value;
            const errorEl = document.getElementById('registerError');
            errorEl.textContent = '';

            try {
                const res = await fetch('/api/user/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, nickname })
                });
                const data = await res.json();
                if (data.code === 200) {
                    alert('注册成功，请登录');
                    switchTab('login');
                    document.getElementById('loginUsername').value = username;
                } else {
                    errorEl.textContent = data.message;
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请重试';
            }
        }

        (async function() {
            try {
                const res = await fetch('/api/user/info');
                const data = await res.json();
                if (data.code === 200) {
                    localStorage.setItem('userInfo', JSON.stringify(data.data));
                    window.location.href = '/lobby.html';
                } else {
                    localStorage.removeItem('userInfo');
                }
            } catch (err) {
                localStorage.removeItem('userInfo');
            }
        })();
    </script>
</body>
</html>
